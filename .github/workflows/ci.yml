name: Boutique CI Pipeline

on:
  push:
    branches: [ "master" ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Determine service path
        id: service-path
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            echo "path=projects/boutique-microservices/frontend" >> $GITHUB_OUTPUT
          else
            echo "path=projects/boutique-microservices/backend/services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Check if package.json exists
        id: check-package
        run: |
          SERVICE_PATH="${{ steps.service-path.outputs.path }}"
          if [ -f "$SERVICE_PATH/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies for ${{ matrix.service }}
        if: steps.check-package.outputs.exists == 'true'
        run: |
          SERVICE_PATH="${{ steps.service-path.outputs.path }}"
          cd $SERVICE_PATH
          npm install

      - name: Run unit tests for ${{ matrix.service }}
        if: steps.check-package.outputs.exists == 'true'
        run: |
          SERVICE_PATH="${{ steps.service-path.outputs.path }}"
          cd $SERVICE_PATH
          npm test -- --coverage --watchAll=false 2>&1 || echo "Tests completed with exit code: $?"

  sonarqube-analysis:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install SonarQube Scanner
        run: |
          npm install -D sonarqube-scanner

      - name: Run SonarQube Analysis
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=boutique-microservices \
            -Dsonar.sources=projects \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.exclusions=**/node_modules/**,**/.git/**,**/dist/**,**/build/**,**/coverage/** \
            -Dsonar.javascript.lcov.reportPaths=projects/**/coverage/lcov.info
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: [unit-tests, sonarqube-analysis]

    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine service path
        id: service-path
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            echo "path=projects/boutique-microservices/frontend" >> $GITHUB_OUTPUT
          else
            echo "path=projects/boutique-microservices/backend/services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Create ECR Repository if not exists
        run: |
          REPO_NAME=${{ matrix.service }}
          REGISTRY_URL=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com
          
          aws ecr describe-repositories --repository-names $REPO_NAME --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository --repository-name $REPO_NAME --region $AWS_REGION
          
          echo "Repository $REPO_NAME ready at $REGISTRY_URL/$REPO_NAME"
          
      - name: Build Docker Image
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            BUILD_PATH="projects/boutique-microservices/frontend"
          else
            BUILD_PATH="projects/boutique-microservices/backend/services/${{ matrix.service }}"
          fi

          echo "Building from $BUILD_PATH"

          docker build \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}:$IMAGE_TAG \
            -f $BUILD_PATH/Dockerfile \
            $BUILD_PATH

      - name: Run Trivy vulnerability scan on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}:$IMAGE_TAG
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'
        continue-on-error: true

      - name: Scan Dockerfile with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: ${{ steps.service-path.outputs.path }}
          format: 'sarif'
          output: 'trivy-config-${{ matrix.service }}.sarif'
        continue-on-error: true

      - name: Push Docker Image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}:$IMAGE_TAG
          echo "Pushing $IMAGE_URI"
          docker push $IMAGE_URI

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in k8s manifests
        run: |
          NEW_TAG=${{ github.sha }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}

          for SERVICE in auth gateway orders order-service product-service user-service; do
            MANIFEST="gitops/k8s/backend/${SERVICE}.yml"
            if [ -f "$MANIFEST" ]; then
              sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:${NEW_TAG}|g" $MANIFEST
            fi
          done

          if [ -f "gitops/k8s/frontend/deployment.yml" ]; then
            sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/frontend:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/frontend:${NEW_TAG}|g" gitops/k8s/frontend/deployment.yml
          fi

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push origin master
