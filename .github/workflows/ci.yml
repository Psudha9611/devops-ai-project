name: Boutique CI Pipeline

on:
  push:
    branches: [ "master" ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    needs: [unit-tests, sonarqube-analysis]

    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      # ... earlier steps ...

      - name: Set image URI
        id: image-uri
        run: |
          IMAGE_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ matrix.service }}:${{ github.sha }}"
          echo "uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build Docker Image
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            BUILD_PATH="projects/boutique-microservices/frontend"
          else
            BUILD_PATH="projects/boutique-microservices/backend/services/${{ matrix.service }}"
          fi

          echo "Building from $BUILD_PATH"

          docker build \
            -t ${{ steps.image-uri.outputs.uri }} \
            -f $BUILD_PATH/Dockerfile \
            $BUILD_PATH

      - name: Run Trivy vulnerability scan on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image-uri.outputs.uri }}
          scan-type: 'image'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

      - name: Push Docker Image
        run: |
          echo "Pushing ${{ steps.image-uri.outputs.uri }}"
          docker push ${{ steps.image-uri.outputs.uri }}
